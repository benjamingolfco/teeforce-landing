    - generic [ref=e82]: The Problem
    - heading "Full course, walkup golfers, no good options." [level=2] [ref=e83]
    - paragraph [ref=e84]: Every course deals with this. Most handle it with a clipboard or a "come back later."
    - generic [ref=e85]:
      - generic [ref=e86]:
        - generic [ref=e87]: "01"
        - generic [ref=e88]:
          - heading "Walkups get turned away" [level=3] [ref=e89]
          - paragraph [ref=e90]: A group shows up ready to play but the sheet looks full. Without a waitlist, they leave — and that's revenue walking out the door.
      - generic [ref=e91]:
        - generic [ref=e92]: "02"
        - generic [ref=e93]:
          - heading "No-shows leave empty slots" [level=3] [ref=e94]
          - paragraph [ref=e95]: Industry data shows 9–18% of tee times go unfilled from no-shows and cancellations. Those slots could go to the walkup golfers you just sent home.
      - generic [ref=e96]:
        - generic [ref=e97]: "03"
        - generic [ref=e98]:
          - heading "Staff are playing waitlist coordinator" [level=3] [ref=e99]
          - paragraph [ref=e100]: Taking names, checking the sheet, calling people back — your pro shop staff has better things to do than manage a clipboard.
