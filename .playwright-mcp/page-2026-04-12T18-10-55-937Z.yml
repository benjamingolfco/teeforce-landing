    - heading "Three steps. No app required." [level=2] [ref=e106]
    - generic [ref=e107]:
      - generic [ref=e108]:
        - generic [ref=e110]: I
        - heading "Golfer scans a QR code" [level=3] [ref=e112]
        - paragraph [ref=e113]: A QR code at the pro shop or clubhouse. Golfers scan it with their phone, enter name, party size, and number. Done — they're on the list.
      - generic [ref=e114]:
        - generic [ref=e116]: II
        - heading "Operator posts an opening" [level=3] [ref=e118]
        - paragraph [ref=e119]: When a tee time opens up — cancellation, no-show, or a gap in the sheet — the operator posts it in Teeforce. One tap.
      - generic [ref=e120]:
        - generic [ref=e122]: III
        - heading "Next golfer gets a text" [level=3] [ref=e124]
        - paragraph [ref=e125]: The next person on the waitlist gets an automatic text. They tap to claim the slot. If they don't respond, it rolls to the next person.
