    - generic [ref=e37]: The Problem
    - heading "Empty slots. Available golfers. No connection." [level=2] [ref=e38]
    - paragraph [ref=e39]: Every course loses revenue to no-shows while golfers who'd happily play have no idea a slot just opened.
    - generic [ref=e40]:
      - generic [ref=e41]:
        - generic [ref=e42]: "01"
        - generic [ref=e43]:
          - heading "No-shows happen" [level=3] [ref=e44]
          - paragraph [ref=e45]: 9–18% of tee times go unfilled from cancellations and no-shows. That's revenue disappearing from your sheet every single day.
      - generic [ref=e46]:
        - generic [ref=e47]: "02"
        - generic [ref=e48]:
          - heading "Golfers are right there" [level=3] [ref=e49]
          - paragraph [ref=e50]: There are people on the range, on the putting green, in the clubhouse — they'd play if they knew a slot just opened. But they don't.
      - generic [ref=e51]:
        - generic [ref=e52]: "03"
        - generic [ref=e53]:
          - heading "Nobody connects them" [level=3] [ref=e54]
          - paragraph [ref=e55]: The open slot and the available golfer are 50 yards apart, but there's no system to bridge the gap. Staff can't track it. Golfers can't see it.
